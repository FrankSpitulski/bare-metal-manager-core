  - path: /opt/dpf/vrf-routes.sh
    permissions: '0755'
    content: |
        #!/bin/bash
        #
        # VRF Route Leaking for DPU Cluster Networking
        #
        # Problem: The DOCA BFB base image enslaves oob_net0 to the "mgmt" VRF,
        # which places all OOB routes in table 1001. Processes running in the
        # default VRF (kubelet, kubeadm, kube-proxy, flannel, containerd) cannot
        # reach the Kubernetes API server or any external host because their
        # lookups hit the main table, which has no default route.
        #
        # Solution: Instead of wrapping every service in "ip vrf exec mgmt",
        # we add ip policy routing rules that selectively leak routes from
        # table 1001 (mgmt VRF) into the default lookup chain. This lets all
        # services reach the API server through normal routing.
        #
        # This script runs BEFORE kubeadm-join.service and kubelet.service.
        #
        set -euo pipefail

        # Bridge netfilter is required for Kubernetes networking (iptables
        # needs to see bridged traffic for kube-proxy and network policies).
        modprobe br_netfilter

        # Extract the API server IP from the kubeadm join command. The join
        # script contains a line like "kubeadm join 10.217.116.174:32482 ..."
        # and we need just the IP portion.
        API_SERVER=$(grep -oP 'kubeadm join \K[0-9.]+' /opt/dpf/join_k8s_cluster.sh | head -1)

        if [ -z "$API_SERVER" ]; then
            echo "ERROR: Could not extract API server IP from /opt/dpf/join_k8s_cluster.sh"
            exit 1
        fi

        # Leak the API server route: tell the kernel that packets destined
        # for the API server should look up table 1001 (mgmt VRF), where
        # oob_net0's routes live. Without this, kubeadm join and kubelet
        # get "network is unreachable" when trying to reach the API server.
        if ! ip rule show | grep -q "to ${API_SERVER} lookup 1001"; then
            ip rule add to "${API_SERVER}" lookup 1001
            echo "Added ip rule: to ${API_SERVER} lookup 1001"
        fi

        # Add a low-priority default route in the main table via the mgmt
        # VRF gateway. This serves two purposes:
        #   1. Flannel auto-detects its interface by looking for the default
        #      route. Without this, flannel can't find a route and fails to
        #      select oob_net0 as its interface.
        #   2. General outbound connectivity (image pulls, DNS, etc.) works
        #      for processes in the default VRF.
        # The high metric (2000) ensures this doesn't override any more
        # specific routes that get added later.
        GATEWAY=$(ip route show table 1001 | grep -oP 'default via \K[0-9.]+' | head -1)

        if [ -z "$GATEWAY" ]; then
            echo "WARNING: Could not find default gateway in table 1001"
        elif ! ip route show table main | grep -q "default via ${GATEWAY}.*metric 2000"; then
            ip route add default via "${GATEWAY}" dev oob_net0 table main metric 2000
            echo "Added default route in main table via ${GATEWAY} metric 2000"
        fi

        echo "VRF route leaking configured successfully"
  - path: /etc/systemd/system/dpf-vrf-routes.service
    permissions: '0644'
    content: |
        [Unit]
        Description=Leak mgmt VRF routes for DPU cluster networking
        After=network-online.target
        Before=kubeadm-join.service kubelet.service
        Wants=network-online.target

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/opt/dpf/vrf-routes.sh

        [Install]
        WantedBy=multi-user.target
  - path: /opt/dpf/post-join-routes.sh
    permissions: '0755'
    content: |
        #!/bin/bash
        #
        # Post-Join VRF Route Fixes for Flannel and kube-proxy
        #
        # Problem: After kubeadm join succeeds, kube-proxy and flannel pods
        # start running on the DPU. These pods communicate with the API server
        # via the Kubernetes service ClusterIP (typically 10.96.0.1), which
        # lives in the service CIDR (10.96.0.0/12). Since these pods run in
        # the default VRF, packets to the service CIDR have no route and fail.
        #
        # Additionally, kubelet needs to perform health checks against pods
        # on the flannel overlay network. Replies from those pods come back
        # via the overlay but need to be routed out through the OOB interface
        # to reach the API server. This is the "asymmetric routing" problem.
        #
        # Solution: Add ip rules so that:
        #   1. Traffic to the Kubernetes service CIDR (10.96.0.0/12) looks up
        #      table 1001 (mgmt VRF) to reach the API server.
        #   2. Traffic to the flannel pod CIDR routes via the main table
        #      (where flannel.1 routes live).
        #   3. Traffic originating FROM the flannel subnet looks up table 1001
        #      so return traffic from pods can reach external destinations.
        #      This is symmetric routing -- the same approach used by DOCA's
        #      configureSymmetricRouting() in provisioner.go.
        #
        # This script runs AFTER kubeadm-join.service completes successfully.
        #
        set -euo pipefail

        # --- Kubernetes Service CIDR routing ---
        # The default service CIDR for Kubernetes is 10.96.0.0/12. kube-proxy
        # and CoreDNS need to reach the API server at 10.96.0.1 (ClusterIP).
        # Leak this range into the mgmt VRF lookup so the packets reach the
        # API server through oob_net0.
        SERVICE_CIDR="10.96.0.0/12"
        if ! ip rule show | grep -q "to ${SERVICE_CIDR} lookup 1001"; then
            ip rule add to "${SERVICE_CIDR}" lookup 1001
            echo "Added ip rule: to ${SERVICE_CIDR} lookup 1001"
        fi

        # --- Flannel overlay routing ---
        # Wait for the flannel.1 VXLAN interface to appear. This interface is
        # created by the flannel DaemonSet pod after it starts. We need its
        # subnet to set up overlay routing rules.
        echo "Waiting for flannel.1 interface..."
        TRIES=0
        MAX_TRIES=60
        while ! ip link show flannel.1 &>/dev/null; do
            TRIES=$((TRIES + 1))
            if [ $TRIES -ge $MAX_TRIES ]; then
                echo "WARNING: flannel.1 did not appear after ${MAX_TRIES} attempts, skipping overlay routes"
                exit 0
            fi
            sleep 5
        done

        # Extract the flannel subnet from the flannel.1 interface. The address
        # is typically something like 10.244.1.0/32; we use the /24 containing
        # it as the pod subnet for this node.
        FLANNEL_IP=$(ip -4 addr show flannel.1 | grep -oP 'inet \K[0-9.]+' | head -1)
        if [ -z "$FLANNEL_IP" ]; then
            echo "WARNING: Could not extract flannel.1 IP, skipping overlay routes"
            exit 0
        fi

        # Derive the /24 subnet from the flannel IP (e.g., 10.244.1.0 -> 10.244.1.0/24)
        FLANNEL_SUBNET=$(echo "$FLANNEL_IP" | sed 's/\.[0-9]*$/.0\/24/')

        # Forward path: traffic destined for the flannel pod subnet should
        # use the main routing table, where the flannel.1 interface route
        # exists. This ensures kubelet health checks reach pods on the overlay.
        if ! ip rule show | grep -q "to ${FLANNEL_SUBNET} lookup main"; then
            ip rule add to "${FLANNEL_SUBNET}" lookup main
            echo "Added ip rule: to ${FLANNEL_SUBNET} lookup main"
        fi

        # Return path (symmetric routing): traffic originating FROM the flannel
        # subnet (i.e., pod replies) should look up table 1001 (mgmt VRF) so
        # that return packets route back through oob_net0 to reach external
        # destinations (API server, other nodes). Without this, replies from
        # pods get lost because the default VRF has no outbound route.
        if ! ip rule show | grep -q "from ${FLANNEL_SUBNET} lookup 1001"; then
            ip rule add from "${FLANNEL_SUBNET}" lookup 1001
            echo "Added ip rule: from ${FLANNEL_SUBNET} lookup 1001"
        fi

        echo "Post-join VRF routes configured successfully"
  - path: /etc/systemd/system/dpf-post-join-routes.service
    permissions: '0644'
    content: |
        [Unit]
        Description=Post-join VRF route fixes for flannel and kube-proxy
        After=kubeadm-join.service
        ConditionPathExists=/opt/dpf/joined_cluster_successfully

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/opt/dpf/post-join-routes.sh

        [Install]
        WantedBy=multi-user.target
{% raw %}
  - path: /etc/systemd/system/kubelet.service.d/10-bf.conf
    permissions: '0644'
    content: |
        [Service]
        Environment="KUBELET_KUBECONFIG_ARGS=--bootstrap-kubeconfig=/etc/kubernetes/bootstrap-kubelet.conf --kubeconfig=/etc/kubernetes/kubelet.conf"
        Environment="KUBELET_CONFIG_ARGS=--config=/var/lib/kubelet/config.yaml"
        EnvironmentFile=-/var/lib/kubelet/kubeadm-flags.env
        EnvironmentFile=-/etc/default/kubelet
        ExecStart=
        ExecStart=/usr/bin/kubelet $KUBELET_KUBECONFIG_ARGS $KUBELET_CONFIG_ARGS $KUBELET_KUBEADM_ARGS $KUBELET_EXTRA_ARGS
  - path: /opt/dpf/join_k8s_cluster.sh
    permissions: '0755'
    content: |
        #!/bin/bash

        COMM_CH_BR_NAME={{if .OOBNetwork}}oob_net0{{else}}br-comm-ch{{end}}
        # update dynamic IP to kubelet configuration
        while true; do
            if [ -d "/sys/class/net/${COMM_CH_BR_NAME}" ]; then
                break
            fi
            sleep 5
        done
        while true; do
            ip_list=($(ip addr show ${COMM_CH_BR_NAME} | grep -oP 'inet \K[\d.]+'))

            if [[ ${#ip_list[@]} -lt 1 ]]; then
                sleep 5
                continue
            fi

            for ip in "${ip_list[@]}"; do
                echo "KUBELET_EXTRA_ARGS=--node-ip=${ip}" > /etc/default/kubelet
                systemctl enable kubelet
                break
            done
            break
        done

        # already joined cluster
        if [ -e "/opt/dpf/joined_cluster_successfully" ]; then
            # avoid re-join when dpu restart
            echo "/opt/dpf/joined_cluster_successfully already exist, the node should already joined cluster."
            exit 0
        fi


        while true
        do
            {{.KubeadmJoinCMD}} && touch /opt/dpf/joined_cluster_successfully && exit 0
            sleep 5 # Wait for 5 seconds before retrying
            if [ -e "/etc/kubernetes/pki/ca.crt" ]; then
                rm -rf /etc/kubernetes/pki/ca.crt
            fi
            if [ -e "/etc/kubernetes/bootstrap-kubelet.conf" ]; then
                rm -rf /etc/kubernetes/bootstrap-kubelet.conf
            fi
        done
        echo "Failed joining k8s cluster after 30 minutes."
        exit 1
  - path: /etc/systemd/system/kubeadm-join.service
    permissions: '0644'
    content: |
        [Unit]
        Description=Run kubeadm until successful or timeout
        After=network-online.target
        Wants=network-online.target

        [Service]
        Type=simple
        ExecStart=/bin/bash /opt/dpf/join_k8s_cluster.sh


        [Install]
        WantedBy=multi-user.target
{% endraw %}

# run these commands (last)
runcmd:
  - [ systemctl, stop, kubelet ]
  - [ /opt/dpf/remove-90-kubelet-bluefield.sh ]
  - [ systemctl, daemon-reload ]
  - [ systemctl, enable, containerd ]
  - [ systemctl, start, containerd ]
  - [ systemctl, enable, dpf-vrf-routes.service ]
  - [ systemctl, enable, dpf-post-join-routes.service ]
  - [ systemctl, enable, kubeadm-join.service ]
  - [ bash, -c, '/opt/forge/runcmds.sh' ]
EOF

cat << \EOF > /mnt/var/lib/cloud/seed/nocloud-net/meta-data
instance-id: nocloud
EOF

cat << \EOF > /mnt/etc/cloud/cloud.cfg.d/99-force-nocloud.cfg
datasource_list: [ NoCloud ]
EOF

ilog "======== End of bfb_modify_os ============"
ilog "$(/usr/sbin/fdisk -l)"
ilog "$(/usr/bin/lsblk)"
ilog "$(/usr/sbin/blkid)"
ilog "$(/usr/bin/efibootmgr -v)"
ilog "==================================="
ilog "==================================="
# restore previous errexit behavior
set +e
}

# This function is called by install.sh script embedded in the BFB
bfb_modify_os() {
  carbide_modify_os
}
